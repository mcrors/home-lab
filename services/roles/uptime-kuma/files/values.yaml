strategy:
  type: Recreate

serviceAccount:
  create: true

service:
  type: ClusterIP
  port: 3001

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: uptime.houli.eu
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - uptime.houli.eu

volume:
  enabled: true
  size: 2Gi
  storageClassName: longhorn

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: node_type
              operator: NotIn
              values:
                - potato

