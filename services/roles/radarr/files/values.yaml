ingress:
  hosts:
    - host: radarr.houli.eu
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ""
      hosts:
        - radarr.houli.eu

nodeSelector:
  longhorn-storage: "true"

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: node_type
              operator: NotIn
              values: ["potato"]

env:
  TZ: "Europe/Prague"
