---

- name: Ensure prowlarr namespace exists
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ prowlarr_namespace }}"
        labels:
          app.kubernetes.io/managed-by: ansible

- name: Ensure prowlarr pvc exists
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: "{{ prowlarr_pvc }}"
        namespace: "{{ prowlarr_namespace }}"
        annotations:
          # Prevent accidental deletion during chart uninstall;
          # this PVC is managed by Ansible, not Helm.
          helm.sh/resource-policy: keep
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 1Gi

- name: Install/Upgrade prowlarr with values.yaml
  kubernetes.core.helm:
    kubeconfig: "{{ kubeconfig_path }}"
    name: prowlarr
    # TODO: use playbook dir below
    chart_ref: ../../../helm/prowlarr
    release_namespace: "{{ prowlarr_namespace }}"
    create_namespace: false
    wait: true
    values_files:
      - "{{ role_path }}/files/values.yaml"
    values:
      persistence:
        existingClaim: "{{ prowlarr_pvc }}"
