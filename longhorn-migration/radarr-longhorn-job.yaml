---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-radarr
  namespace: radarr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi  # adjust to match your old volume

---
apiVersion: batch/v1
kind: Job
metadata:
  name: migration-job
  namespace: radarr
spec:
  template:
    spec:
      nodeName: lib-pi-05
      containers:
        - name: migrate
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache rsync
              rsync -av --progress /old-data/ /new-data/
              echo "Migration complete"
          volumeMounts:
            - name: old-data
              mountPath: /old-data
            - name: new-data
              mountPath: /new-data
      restartPolicy: Never
      volumes:
        - name: old-data
          persistentVolumeClaim:
            claimName: pvc-migrate-iscsi-radarr
        - name: new-data
          persistentVolumeClaim:
            claimName: pvc-radarr
  backoffLimit: 0
