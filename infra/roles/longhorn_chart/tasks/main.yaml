---

- name: Add longhorn Helm repo
  kubernetes.core.helm_repository:
    name: longhorn
    repo_url: https://charts.longhorn.io

- name: Update Helm repo cache
  kubernetes.core.helm:
    kubeconfig: "{{ kubeconfig_path }}"
    name: cache-refresh
    namespace: kube-system
    state: absent
    update_repo_cache: true

- name: Ensure longhorn-system namespace exists
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ longhorn_namespace }}"

- name: Install/Upgrade longhorn with values.yaml
  kubernetes.core.helm:
    kubeconfig: "{{ kubeconfig_path }}"
    name: longhorn
    chart_ref: longhorn/longhorn
    chart_version: "{{ chart_version }}"
    release_namespace: "{{ longhorn_namespace }}"
    create_namespace: false
    wait: true
    values_files:
      - "{{ role_path }}/files/values.yaml"

- name: Create longhorn-ingress
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    template: "{{ role_path }}/templates/ingress.yaml.j2"
