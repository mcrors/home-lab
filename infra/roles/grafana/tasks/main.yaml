---

- name: Ensure grafana namespace exists
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ grafana_namespace }}"

- name: Ensure grafana pvc exists
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: "{{ grafana_pvc }}"
        namespace: "{{ grafana_namespace }}"
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 1Gi

- name: Create grafana admin secret
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ grafana_secret_name }}"
        namespace: "{{ grafana_namespace }}"
      stringData:
        admin-user: admin
        admin-password: "{{ vault_grafana_admin_password }}"

- name: Add Grafana Helm repo
  kubernetes.core.helm_repository:
    name: grafana
    repo_url: https://grafana.github.io/helm-charts

- name: Update Helm repo cache
  kubernetes.core.helm:
    name: cache-refresh
    namespace: kube-system
    state: absent
    update_repo_cache: true
    kubeconfig: "{{ kubeconfig_path }}"

- name: Install/Upgrade grafana with values.yaml
  kubernetes.core.helm:
    kubeconfig: "{{ kubeconfig_path }}"
    name: grafana
    chart_ref: grafana/grafana
    chart_version: "{{ grafana_chart_version }}"
    release_namespace: "{{ grafana_namespace }}"
    create_namespace: false
    wait: true
    values_files:
      - "{{ role_path }}/files/values.yaml"
    values:
      persistence:
        existingClaim: "{{ grafana_pvc }}"
      admin:
        existingSecret: "{{ grafana_secret_name }}"
