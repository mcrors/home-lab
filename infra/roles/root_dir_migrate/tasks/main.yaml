---

# ----------------------------------------------------------
# Detect if root is already on the SSD LV
# ----------------------------------------------------------
- name: Get current root device
  command: findmnt -n -o SOURCE /
  register: current_root_device
  changed_when: false

- name: Check if root is already on the LV
  set_fact:
    root_already_on_ssd: "{{ root_lv_name in current_root_device.stdout }}"

- name: Root already on SSD — nothing to do
  debug:
    msg: "Root is already on /dev/{{ root_vg_name }}/{{ root_lv_name }}, skipping all tasks."
  when: root_already_on_ssd

- name: Set LV device path
  set_fact:
    lv_device: "/dev/{{ root_vg_name }}/{{ root_lv_name }}"
  when: not root_already_on_ssd

# ----------------------------------------------------------
# Make sure nothing is running on the node
# ----------------------------------------------------------

- name: Cordon nodes
  delegate_to: localhost
  connection: local
  become: false
  command: >
    kubectl cordon {{ inventory_hostname | regex_replace('\.home$', '') }}
  when: not root_already_on_ssd

- name: Drain nodes
  delegate_to: localhost
  connection: local
  become: false
  command: >
    kubectl drain {{ inventory_hostname | regex_replace('\.home$', '') }} --ignore-daemonsets --delete-emptydir-data
  when: not root_already_on_ssd

# ----------------------------------------------------------
# Rsync root to the new LV
# ----------------------------------------------------------
- name: Create temporary mount point
  file:
    path: /mnt/new_root
    state: directory
  when: not root_already_on_ssd

- name: Mount the new root LV
  mount:
    path: /mnt/new_root
    src: "{{ lv_device }}"
    fstype: "{{ root_fs_type }}"
    state: mounted
  when: not root_already_on_ssd

- name: Rsync current root to new LV
  shell: |
    rsync -axS --delete \
      {% for exclude in rsync_excludes %}
      --exclude='{{ exclude }}' \
      {% endfor %}
      / /mnt/new_root/
  when: not root_already_on_ssd

- name: Create excluded mount point dirs on new root
  file:
    path: "/mnt/new_root/{{ item }}"
    state: directory
    mode: "{{ '1777' if item == 'tmp' else '0755' }}"
  loop:
    - boot
    - dev
    - proc
    - sys
    - tmp
    - run
    - mnt
    - media
  when: not root_already_on_ssd

# ----------------------------------------------------------
# Update fstab on the NEW root
# ----------------------------------------------------------
- name: Get LV UUID
  command: blkid -s UUID -o value {{ lv_device }}
  register: lv_uuid
  changed_when: false
  when: not root_already_on_ssd

- name: Get current SD card root entry from fstab
  shell: grep -E '^\S+\s+/\s+' /mnt/new_root/etc/fstab
  register: old_fstab_root
  changed_when: false
  when: not root_already_on_ssd

- name: Replace root entry in new fstab
  lineinfile:
    path: /mnt/new_root/etc/fstab
    regexp: '^\S+\s+/\s+'
    line: "UUID={{ lv_uuid.stdout }}  /  {{ root_fs_type }}  defaults,noatime  0  1"
  when: not root_already_on_ssd

# ----------------------------------------------------------
# Update boot config to point root at the LV
# ----------------------------------------------------------
- name: Get LV PARTUUID (fallback to UUID)
  set_fact:
    root_param: "UUID={{ lv_uuid.stdout }}"
  when: not root_already_on_ssd

- name: Read current cmdline.txt
  slurp:
    src: "{{ boot_cmdline_path }}"
  register: cmdline_content
  when: not root_already_on_ssd

- name: Update root= in cmdline.txt
  copy:
    content: >-
      {{ (cmdline_content.content | b64decode) | regex_replace('root=\S+', 'root=' + root_param) }}
    dest: "{{ boot_cmdline_path }}"
  when: not root_already_on_ssd

# ----------------------------------------------------------
# 8. Unmount and reboot
# ----------------------------------------------------------
- name: Unmount new root
  mount:
    path: /mnt/new_root
    state: unmounted
  when: not root_already_on_ssd

- name: Remove temporary mount point
  file:
    path: /mnt/new_root
    state: absent
  when: not root_already_on_ssd

- name: Reboot to new root
  reboot:
    reboot_timeout: 300
    msg: "Rebooting to switch root to SSD"
  when: not root_already_on_ssd

# ----------------------------------------------------------
# Post-reboot verification
# ----------------------------------------------------------
- name: Verify root is now on SSD
  command: findmnt -n -o SOURCE /
  register: post_reboot_root
  changed_when: false

- name: Confirm migration succeeded
  assert:
    that:
      - root_lv_name in post_reboot_root.stdout
    fail_msg: "Root migration failed — root is still on {{ post_reboot_root.stdout }}"
    success_msg: "Root successfully moved to {{ post_reboot_root.stdout }}"

# ----------------------------------------------------------
# Uncordon nodes
# ----------------------------------------------------------
- name: uncordon nodes
  delegate_to: localhost
  become: false
  command: >
    kubectl uncordon {{ inventory_hostname }}
