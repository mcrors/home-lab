groups:
  - name: availability
    rules:
      - alert: NodeDown
        expr: up{job=~"node-exporter|node"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node down: {{ $labels.instance }}"
          description: "Prometheus cannot scrape {{ $labels.instance }} (job={{ $labels.job }}) for 2 minutes."

  - name: events
    rules:
      - alert: HostHardwareTempHigh
        expr: max by (instance, chip) (node_hwmon_temp_celsius{chip="platform_coretemp_0"}) > 70
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU temperature on {{ $labels.instance }}"
          description: "CPU ({{ $labels.chip }}) max core temp > 70°C for 10m (current: {{ $value }}°C)"

      - alert: HostHardwareTempCritical
        expr: max by (instance, chip) (node_hwmon_temp_celsius{chip="platform_coretemp_0"}) > 80
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL CPU temperature on {{ $labels.instance }}"
          description: "CPU ({{ $labels.chip }}) max core temp > 80°C for 5m (current: {{ $value }}°C)"

      - alert: NodeRecentlyRebooted
        expr: (up{job=~"node-exporter|node"} == 1) * (time() - node_boot_time_seconds) < 300
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "Node rebooted: {{ $labels.instance }}"
          description: "Uptime is {{ humanizeDuration $value }}."

      # (K3s/k8s) Container restarts (needs kube-state-metrics)
      # - alert: PodContainerRestarted
      #   expr: increase(kube_pod_container_status_restarts_total[5m]) > 0
      #   for: 0m
      #   labels:
      #     severity: warning
      #   annotations:
      #     summary: "Pod container restarted in {{ $labels.namespace }}: {{ $labels.pod }} / {{ $labels.container }}"
      #     description: "Restart count increased in the last 5 minutes."

      # (Docker/cAdvisor) Container restarted (needs cAdvisor on hosts)
      # - alert: ContainerRestarted
      #   expr: changes(container_start_time_seconds{image!=""}[5m]) > 0
      #   for: 0m
      #   labels:
      #     severity: warning
      #   annotations:
      #     summary: "Container restarted: {{ $labels.instance }} {{ $labels.name }}"
      #     description: "Container start time changed in the last 5 minutes."

  - name: health
    rules:
      # CPU: average utilization over 5m (1 - idle)
      - alert: HighCPUUsage
        expr: (1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "Average CPU > 90% for 5 minutes."

      # Memory pressure (MemAvailable < 10%)
      - alert: LowMemoryAvailable
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low memory on {{ $labels.instance }}"
          description: "Less than 10% memory available."

      # Disk space low (real filesystems)
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"^/(run|var/run)($|/)"}
          /
          node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"^/(run|var/run)($|/)"}) < 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Free space < 10%."

      # Disk will fill soon (project 4h ahead)
      - alert: DiskWillFillSoon
        expr: |
          predict_linear(
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"^/(run|var/run)($|/)"}[6h],
            4*3600
          ) < 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Disk may fill within 4 hours on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Trend suggests available space will hit 0 within ~4 hours."

      # Filesystem turned read-only (bad sign)
      - alert: FilesystemReadOnly
        expr: node_filesystem_readonly{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"^/(run|var/run)($|/)"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Read-only filesystem on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Filesystem flipped to read-only."

