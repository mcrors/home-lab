---
- name: Ensure LVM tools are installed
  package:
    name: lvm2
    state: present

- name: Create physical volume
  command: pvcreate {{ prometheus_vg_name }}
  args:
    creates: "/dev/{{ prometheus_vg_name }}/{{ prometheus_lvs[0].name }}"  # Check if first LV exists

- name: Create volume group if not exists
  command: vgcreate {{ prometheus_vg_name }} {{ prometheus_disk }}
  args:
    creates: "/dev/{{ prometheus_vg_name }}/{{ prometheus_lvs[0].name }}"  # Check if first LV exists

- name: Create logical volumes
  lvol:
    vg: "{{ prometheus_vg_name }}"
    lv: "{{ item.name }}"
    size: "{{ item.size }}"
  loop: "{{ prometheus_lvs }}"

- name: Format the logical volumes
  filesystem:
    fstype: ext4
    dev: "/dev/{{ prometheus_vg_name }}/{{ item.name }}"
  loop: "{{ prometheus_lvs }}"

- name: Ensure mount points exist
  file:
    path: "{{ item.mount }}"
    state: directory
    mode: "0755"
  loop: "{{ prometheus_lvs }}"

- name: Ensure logical volumes are mounted and persist in fstab
  mount:
    path: "{{ item.mount }}"
    src: "/dev/{{ prometheus_vg_name }}/{{ item.name }}"
    fstype: ext4
    state: mounted
    opts: defaults
  loop: "{{ prometheus_lvs }}"

