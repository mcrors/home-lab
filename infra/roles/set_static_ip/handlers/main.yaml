---
- name: Restart systemd-networkd
  systemd:
    name: systemd-networkd
    state: restarted
    enabled: true

- name: Restart systemd-resolved
  systemd:
    name: systemd-resolved
    state: restarted
    enabled: true
  failed_when: false

- name: Restart dhcpcd
  systemd:
    name: dhcpcd
    state: restarted
    enabled: true

- name: Apply netplan
  command: netplan apply
  async: 1
  poll: 0
