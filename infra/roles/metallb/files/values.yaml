# Intentionally minimal: rely on sane chart defaults.

# controller:
#   replicaCount: 1

# speaker:
#   # hostNetwork, tolerations, etc can be customized if needed
#   tolerations: []
#   nodeSelector: {}

# metrics:
#   enabled: false         # flip to true + add ServiceMonitor if you have Prometheus
controller:
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: node_type
                operator: In
                values:
                  - "potato"
        - weight: 50
          preference:
            matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
speaker:
  tolerations:
    - key: "node_type"
      operator: "Exists"
