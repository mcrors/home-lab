---
- name: Activating cgroup support (GRUB)
  lineinfile:
    path: /etc/default/grub
    regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT="(?!.*\bcgroup_enable=cpuset\b).*)(")\s*$'
    line: '\1 cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory\2'
    backrefs: true
  notify:
    - update grub
    - reboot
