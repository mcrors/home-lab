---
# ============================================================
# root_on_ssd — Move root filesystem from SD card to SSD LV
# ============================================================
# Idempotent: detects if root is already on the LV and skips.
# Re-runnable: every task guards on current state.
# ============================================================

# ----------------------------------------------------------
# 1. Detect if root is already on the SSD LV
# ----------------------------------------------------------
- name: Get current root device
  command: findmnt -n -o SOURCE /
  register: current_root_device
  changed_when: false

- name: Check if root is already on the LV
  set_fact:
    root_already_on_ssd: "{{ root_lv_name in current_root_device.stdout }}"

- name: Root already on SSD — nothing to do
  debug:
    msg: "Root is already on /dev/{{ root_vg_name }}/{{ root_lv_name }}, skipping all tasks."
  when: root_already_on_ssd

# ----------------------------------------------------------
# 2. Discover the target SSD
# ----------------------------------------------------------
- name: Gather candidate disks
  shell: |
    lsblk -dnbo NAME,SIZE,TYPE | awk '$3 == "disk" {
      size_gb = $2 / 1024 / 1024 / 1024
      if (size_gb >= {{ ssd_min_size_gb }} && size_gb <= {{ ssd_max_size_gb }})
        print "/dev/" $1
    }'
  register: candidate_disks
  changed_when: false
  when: not root_already_on_ssd

- name: Fail if no suitable SSD found
  fail:
    msg: >
      No disk found in the {{ ssd_min_size_gb }}–{{ ssd_max_size_gb }} GB range.
      Available disks: {{ candidate_disks.stdout_lines | default([]) }}
  when:
    - not root_already_on_ssd
    - candidate_disks.stdout_lines | length == 0

- name: Fail if multiple candidate SSDs found
  fail:
    msg: >
      Multiple disks found in range: {{ candidate_disks.stdout_lines }}.
      Set the target disk explicitly.
  when:
    - not root_already_on_ssd
    - candidate_disks.stdout_lines | length > 1

- name: Set target SSD device
  set_fact:
    ssd_device: "{{ candidate_disks.stdout_lines[0] }}"
  when: not root_already_on_ssd

- name: Show discovered SSD
  debug:
    msg: "Target SSD: {{ ssd_device }}"
  when: not root_already_on_ssd

# ----------------------------------------------------------
# 3. LVM setup — PV, VG, LV (all idempotent)
# ----------------------------------------------------------

- name: Install LVM packages
  apt:
    name: lvm2
    state: present
    update_cache: yes

- name: Create physical volume
  lvg:
    pvs: "{{ ssd_device }}"
    vg: "{{ root_vg_name }}"
    state: present
  when: not root_already_on_ssd

- name: Create logical volume (new VG)
  lvol:
    vg: "{{ root_vg_name }}"
    lv: "{{ root_lv_name }}"
    size: "{{ root_lv_size }}"
  when: not root_already_on_ssd

# ----------------------------------------------------------
# 4. Filesystem
# ----------------------------------------------------------
- name: Set LV device path
  set_fact:
    lv_device: "/dev/{{ root_vg_name }}/{{ root_lv_name }}"
  when: not root_already_on_ssd

- name: Show LV device path
  debug:
    msg: "LV device path: {{ lv_device }}"
  when: not root_already_on_ssd

- name: Check if filesystem exists on LV
  command: blkid -s TYPE -o value {{ lv_device }}
  register: fs_check
  failed_when: false
  changed_when: false
  when: not root_already_on_ssd

- name: Create filesystem on root LV
  filesystem:
    fstype: "{{ root_fs_type }}"
    dev: "{{ lv_device }}"
  when:
    - not root_already_on_ssd
    - fs_check.stdout == ""
