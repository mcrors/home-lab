- name: Install apt packages
  apt:
    pkg:
      - vim
      - net-tools
      - lm-sensors
      - python3-pip
    state: present
    update_cache: yes

- name: Disable ssh Password login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
  notify:
    - restart sshd

- name: Copy rc files
  copy:
    src: "./src_files/{{ item }}"
    dest: "/home/{{ ansible_user }}/{{ item }}"
    mode: '0644'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  with_items:
    - .bashrc
    - .vimrc

- name: Mount /tmp as tmpfs
  mount:
    path: /tmp
    src: tmpfs
    fstype: tmpfs
    opts: "defaults,noatime,mode=1777,size={{ tmpfs_size_mb }}m"
    state: mounted

