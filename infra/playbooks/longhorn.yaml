
- name: Install longhorn pre-reqs
  hosts: longhorn
  become: true
  roles:
    - longhorn_prereq
  vars_files:
      - ../vars/main.yaml

- name: Setup storage node disks
  hosts: longhorn
  become: true
  roles:
    - longhorn_disk_setup
  vars_files:
      - ../vars/main.yaml

- name: Label longhorn nodes
  hosts: longhorn
  connection: local
  gather_facts: false
  become: false
  tasks:
    - name: Set longhorn-storage label
      delegate_to: localhost
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        kind: Node
        name: "{{ inventory_hostname | regex_replace('\\.home$', '') }}"
        state: patched
        definition:
          metadata:
            labels:
              longhorn-storage: "true"
              node.longhorn.io/create-default-disk: "true"
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  vars_files:
      - ../vars/main.yaml

- name: Install longhorn into K3s
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  roles:
    - longhorn_chart
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  vars_files:
      - ../vars/main.yaml
