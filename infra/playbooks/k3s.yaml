---

- hosts: k3s_cluster
  become: true
  remote_user: hla
  roles:
    - k3s_prereq
    - download_k3s
    - k3s_cgroup_support
  vars_files:
      - ../vars/main.yaml
  tags:
    - pre
    - master
    - nodes

- hosts: k3smaster[0]
  become: true
  remote_user: hla
  roles:
    - k3s/server_init
    - k3s/kube_vip
  vars_files:
      - ../vars/main.yaml
  tags: master

- hosts: k3snodes
  become: true
  remote_user: hla
  roles:
    - role: k3s/node_join
  vars_files:
      - ../vars/main.yaml
  tags: nodes

- name: Configure K3s
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  roles:
    - k3s_config
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  vars_files:
      - ../vars/main.yaml
  tags: config

