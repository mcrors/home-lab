---

- hosts: k3s_cluster
  become: true
  remote_user: hla
  roles:
    - common
    - set_static_ip
    - k3s_prereq
    - download_k3s
    - k3s_cgroup_support
  vars_files:
      - ../vars/main.yaml
  tags:
    - pre
    - master
    - nodes

- hosts: k3smaster
  become: true
  remote_user: hla
  roles:
    - role: k3s/master
  vars_files:
      - ../vars/main.yaml
  tags: master

- hosts: k3snodes
  become: true
  remote_user: hla
  roles:
    - role: k3s/node
  vars_files:
      - ../vars/main.yaml
  tags: nodes

- name: Configure K3s
  hosts: localhost
  gather_facts: false
  become: false
  roles:
    - k3s_config
  vars_files:
      - ../vars/main.yaml
  tags: config

