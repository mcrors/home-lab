---

- name: Run Common Operations
  hosts: all_nodes
  become: true
  roles:
    - common
  vars_files:
    - ../vars/main.yaml
  tags:
    - basic

- name: Move root to ssd
  hosts: sbc
  become: true
  roles:
    - root_storage
  vars_files:
    - ../vars/main.yaml
    - ../vars/root_storage.yaml
  tags:
    - storage

- name: Move root to ssd
  hosts: migrate
  become: true
  roles:
    - root_dir_migrate
  vars_files:
    - ../vars/main.yaml
    - ../vars/root_storage.yaml
  tags:
    - storage
